name: work-tools

services:
    mongo:
        image: mongo:7
        container_name: work-tools-mongo
        restart: unless-stopped
        ports:
            - "${MONGO_PORT}:27017"
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
            MONGO_APP_DB: ${MONGO_APP_DB}
            MONGO_APP_USER: ${MONGO_APP_USER}
            MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
            MONGO_APP_COLLECTION: ${MONGO_APP_COLLECTION}
        volumes:
            - type: bind
              source: ${MONGO_DATA_DIR}
              target: /data/db
            - type: bind
              source: ./mongo
              target: /docker-entrypoint-initdb.d
              read_only: true
        healthcheck:
            test:
              [
                  "CMD-SHELL",
                  "mongosh --quiet -u \"$MONGO_ROOT_USERNAME\" -p \"$MONGO_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1"
              ]
            interval: 10s
            timeout: 10s
            retries: 20
            start_period: 20s
        networks:
            - infra

    clickhouse:
        image: clickhouse/clickhouse-server:25.11
        container_name: work-tools-clickhouse
        restart: unless-stopped
        ulimits:
            nofile:
                soft: 262144
                hard: 262144
        ports:
            - "${CLICKHOUSE_HTTP_PORT}:8123"
            - "${CLICKHOUSE_TCP_PORT}:9000"
        environment:
            CLICKHOUSE_DB: ${CLICKHOUSE_DB}
            CLICKHOUSE_USER: ${CLICKHOUSE_USER}
            CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
            CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        volumes:
            - type: bind
              source: ${CLICKHOUSE_DATA_DIR}
              target: /var/lib/clickhouse
            - type: bind
              source: ${CLICKHOUSE_LOG_DIR}
              target: /var/log/clickhouse-server
            - type: bind
              source: ./clickhouse/config.d
              target: /etc/clickhouse-server/config.d
              read_only: true
            - type: bind
              source: ./clickhouse/initdb
              target: /docker-entrypoint-initdb.d
              read_only: true
        healthcheck:
            test:
              [
                  "CMD-SHELL",
                  "clickhouse-client --host 127.0.0.1 --user \"$CLICKHOUSE_USER\" --password \"$CLICKHOUSE_PASSWORD\" --query 'SELECT 1' | grep 1"
              ]
            interval: 10s
            timeout: 5s
            retries: 30
            start_period: 20s
        networks:
            - infra

networks:
    infra:
        name: work-tools
