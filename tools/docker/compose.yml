name: work-tools

services:
    mongo:
        image: ${MONGO_IMAGE}
        container_name: ${MONGO_CONTAINER_NAME}
        restart: unless-stopped
        ports:
            - "${MONGO_PORT}:${MONGO_INTERNAL_PORT}"
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
            MONGO_APP_DB: ${MONGO_APP_DB}
            MONGO_APP_USER: ${MONGO_APP_USER}
            MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
            MONGO_APP_COLLECTION: ${MONGO_APP_COLLECTION}
        volumes:
            - type: bind
              source: ${MONGO_DATA_DIR}
              target: ${MONGO_DATA_TARGET_DIR}
            - type: bind
              source: ./mongo
              target: ${MONGO_INITDB_TARGET_DIR}
              read_only: true
        healthcheck:
            test:
              [
                  "CMD-SHELL",
                  "mongosh --quiet --port ${MONGO_INTERNAL_PORT} -u \"$MONGO_ROOT_USERNAME\" -p \"$MONGO_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1"
              ]
            interval: 10s
            timeout: 10s
            retries: 20
            start_period: 20s
        networks:
            - infra

    clickhouse:
        image: ${CLICKHOUSE_IMAGE}
        container_name: ${CLICKHOUSE_CONTAINER_NAME}
        restart: unless-stopped
        ulimits:
            nofile:
                soft: 262144
                hard: 262144
        ports:
            - "${CLICKHOUSE_HTTP_PORT}:${CLICKHOUSE_HTTP_INTERNAL_PORT}"
            - "${CLICKHOUSE_TCP_PORT}:${CLICKHOUSE_TCP_INTERNAL_PORT}"
        environment:
            CLICKHOUSE_DB: ${CLICKHOUSE_DB}
            CLICKHOUSE_USER: ${CLICKHOUSE_USER}
            CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
            CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        volumes:
            - type: bind
              source: ${CLICKHOUSE_DATA_DIR}
              target: ${CLICKHOUSE_DATA_TARGET_DIR}
            - type: bind
              source: ${CLICKHOUSE_LOG_DIR}
              target: ${CLICKHOUSE_LOG_TARGET_DIR}
            - type: bind
              source: ./clickhouse/config.d
              target: ${CLICKHOUSE_CONFIG_TARGET_DIR}
              read_only: true
            - type: bind
              source: ./clickhouse/initdb
              target: ${CLICKHOUSE_INITDB_TARGET_DIR}
              read_only: true
        healthcheck:
            test:
              [
                  "CMD-SHELL",
                  "clickhouse-client --host 127.0.0.1 --port ${CLICKHOUSE_TCP_INTERNAL_PORT} --user \"$CLICKHOUSE_USER\" --password \"$CLICKHOUSE_PASSWORD\" --query 'SELECT 1' | grep 1"
              ]
            interval: 10s
            timeout: 5s
            retries: 30
            start_period: 20s
        networks:
            - infra

    nats:
        image: nats:2.11
        container_name: ${NATS_CONTAINER_NAME}
        restart: unless-stopped
        command:
            [
                "--name",
                "${NATS_SERVER_NAME}",
                "--jetstream",
                "--store_dir",
                "${NATS_STORE_DIR}",
                "--http_port",
                "${NATS_MONITOR_INTERNAL_PORT}"
            ]
        ports:
            - "${NATS_PORT}:${NATS_INTERNAL_PORT}"
            - "${NATS_MONITOR_PORT}:${NATS_MONITOR_INTERNAL_PORT}"
        volumes:
            - type: bind
              source: ${NATS_DATA_DIR}
              target: ${NATS_STORE_DIR}
        networks:
            - infra

networks:
    infra:
        name: work-tools
